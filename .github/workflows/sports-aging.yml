# The slow feedback loop: monthly post-publication aging review. REPORT-ONLY - this job
# never edits or deploys the site. It re-fetches every published story's sources, flags
# dead links and invalidated premises, and uploads the report as an artifact for the human
# editor-in-chief. Sports news rots fast; a correction policy protects credibility more
# than perfection does.
name: GoCheckMySports aging review

on:
  schedule:
    - cron: "0 13 1 * *"   # 1st of the month, 13:00 UTC (US morning)
  workflow_dispatch: {}

permissions:
  contents: write   # the correction loop (charter 2026-07-15) commits approved updates

jobs:
  aging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Run the aging review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 aging.py

      # CLOSED LOOP (charter, 2026-07-15): premise-flagged stories are re-run through the
      # same three-role pipeline against their sources AS THEY READ NOW; only approver-
      # signed corrections apply, each stamped with a visible correction note. Dead-link
      # flags stay report-only for a human.
      - name: Queue corrections through the pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 corrections.py

      - name: Commit approved corrections (deploys)
        run: |
          git config user.name "Jack Berno"
          git config user.email "297991518+jaybiz0131@users.noreply.github.com"
          git add site/content
          git diff --cached --quiet || { git commit -m "corrections: aging-review updates $(date -u +%Y-%m-%d)"; git push; }

      - name: Upload the aging report
        uses: actions/upload-artifact@v4
        with:
          name: aging-report
          path: |
            out/aging_report.json
            out/aging_report.md
          if-no-files-found: warn

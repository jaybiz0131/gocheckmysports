# The breaking-news watcher (directive item 2, 2026-07-14): every 30 minutes, NO model
# calls, ~$0. Plain threshold: a fresh story carried by 4+ independent sources (the desk's
# own RSS aggregation) IS the sports definition of breaking news. On trigger it calls the
# full brief workflow with breaking=true, which adds the two-source publish gate.
# Thresholds are configurable without code changes via repo Variables:
#   WATCH_MIN_SOURCES (4), WATCH_FRESH_MIN (90),
#   WATCH_COOLDOWN_MIN (120: quiet while coverage is already fresh).
# The called workflow shares the sports-publish concurrency group, so a breaking run
# QUEUES behind any in-flight scheduled publish: never races it (directive item 9).
name: Breaking-news watcher

on:
  schedule:
    # :17/:47 (odd minutes drift far less on GitHub's scheduler than :00/:30). The :47
    # tick also catches the evening slot's 23:45 recovery deadline same-day.
    - cron: "17,47 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write   # the missed-edition audit opens a flag issue

jobs:
  watch:
    runs-on: ubuntu-latest
    outputs:
      trigger: ${{ steps.w.outputs.trigger }}
      breaking: ${{ steps.w.outputs.breaking }}
      reason: ${{ steps.w.outputs.reason }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Threshold check (no model, no spend)
        id: w
        env:
          WATCH_MIN_SOURCES: ${{ vars.WATCH_MIN_SOURCES }}
          WATCH_FRESH_MIN: ${{ vars.WATCH_FRESH_MIN }}
          WATCH_COOLDOWN_MIN: ${{ vars.WATCH_COOLDOWN_MIN }}
        run: python3 watcher.py

      # A window that closed with no edition is a permanently missed slot the recovery
      # net failed to save. One open issue per title; quiet if already flagged.
      - name: Flag permanently missed editions
        if: steps.w.outputs.missed != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          MISSED: ${{ steps.w.outputs.missed }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request
          tok, repo = os.environ["GH_TOKEN"], os.environ["REPO"]
          hdrs = {"Authorization": f"Bearer {tok}", "Accept": "application/vnd.github+json"}
          title = "Missed edition: a slot window closed without publishing"
          q = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues?state=open&per_page=100",
              headers=hdrs)
          open_titles = {i["title"] for i in json.load(urllib.request.urlopen(q))}
          if title in open_titles:
              print("already flagged; staying quiet")
          else:
              body = ("These edition windows closed with no edition file on disk (cron "
                      "drift plus a failed or skipped recovery): " + os.environ["MISSED"]
                      + f"\n\nDetected by the watcher: {os.environ['RUN_URL']}\n"
                      "Close once the gap is understood; a slot cannot be recovered "
                      "after its window ends.")
              data = json.dumps({"title": title, "body": body,
                                 "labels": ["pipeline"]}).encode()
              req = urllib.request.Request(f"https://api.github.com/repos/{repo}/issues",
                                           data=data, headers=hdrs, method="POST")
              urllib.request.urlopen(req)
              print("flag issue opened")
          PYEOF

  # news triggers run with the additive breaking gate; SLOT RECOVERY runs as a normal
  # scheduled-equivalent pipeline (breaking=false)
  fire:
    needs: watch
    if: needs.watch.outputs.trigger == 'true'
    uses: ./.github/workflows/sports-news-brief.yml
    with:
      breaking: ${{ needs.watch.outputs.breaking == 'true' }}
    secrets: inherit
    permissions:
      contents: write
      issues: write

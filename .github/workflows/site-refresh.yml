# Site refresh: keeps the site current between daily briefs.
#
# Refreshing the site is just pinging the Netlify build hook (the build regenerates the
# pages from committed content). The brief slots already deploy via their story push or
# hook ping; this one extra midday ping covers the gap between them. The free-tier build
# minutes pool (~300/month) is shared across ALL the team's sites, so the cadence is
# deliberately lean (owner's call, 2026-07-12). Add or remove cron lines to tune.
#
# No secrets beyond NETLIFY_BUILD_HOOK, no code runs here, and a missing hook is a
# documented skip, never a failure.
name: Site refresh

on:
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC (between the 07:40 and 16:40 briefs)
  workflow_dispatch: {}

permissions: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the Netlify build hook
        env:
          HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          if [ -n "$HOOK" ]; then
            curl -s -f -X POST -d '{}' "$HOOK" > /dev/null \
              && echo "::notice::Triggered a Netlify rebuild." \
              || echo "::warning::Build hook ping failed; the site will refresh on the next scheduled build."
          else
            echo "::notice::NETLIFY_BUILD_HOOK not set; skipping (the daily brief and pushes still refresh the site)."
          fi

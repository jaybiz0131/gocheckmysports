# Netlify config for the GoCheckMySports site (gocheckmysports.com).
# This repo IS the project, so the config lives at the root and importing the repo into
# Netlify needs no extra settings: this file supplies the build command, publish directory,
# Python version, and headers. The generator (site_build.py) is standard-library only and
# builds site/publish/ deterministically from committed content.
[build]
  # Refresh the live-scores snapshot first (keyless league APIs; any fetch error falls
  # back to the committed snapshot instead of failing the deploy), then build.
  command = "python3 scores_pulse.py || true; python3 site_build.py"
  publish = "site/publish"

[build.environment]
  PYTHON_VERSION = "3.12"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
